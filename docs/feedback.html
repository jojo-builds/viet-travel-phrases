<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send Feedback - Viet Travel Phrasebook</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAFAF8;
      color: #1A1A2E;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #FF6B35;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    p.sub {
      font-size: 14px;
      color: #6B7280;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #E5E7EB;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      color: #1A1A2E;
      background: #FAFAF8;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #FF6B35;
    }
    textarea {
      height: 120px;
      resize: vertical;
    }
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #FF6B35;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #E55A2B; }
    .back {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #6B7280;
      text-decoration: none;
    }
    .back:hover { color: #FF6B35; }
    .success {
      display: none;
      text-align: center;
      padding: 20px 0;
    }
    .success .icon {
      font-size: 24px;
      font-weight: 700;
      color: #10B981;
      margin-bottom: 12px;
    }
    .success h2 { font-size: 20px; margin-bottom: 8px; }
    .success p { font-size: 14px; color: #6B7280; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Feedback</div>
    <h1>Send Feedback</h1>
    <p class="sub">Help us improve Viet Travel Phrasebook. We read every message.</p>

    <form id="feedback-form" action="https://formspree.io/f/mojpkagy" method="POST">
      <label for="type">Type of feedback</label>
      <select id="type" name="type">
        <option value="bug">Bug or error</option>
        <option value="phrase">Incorrect phrase or audio</option>
        <option value="suggestion">Feature suggestion</option>
        <option value="other">Other</option>
      </select>

      <label for="message">Your message</label>
      <textarea id="message" name="message" placeholder="Tell us what's on your mind..." required></textarea>

      <label for="email">Email (optional - for follow-up)</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" />

      <input type="hidden" name="_subject" value="App Feedback - Viet Travel Phrasebook" />
      <input type="text" name="_gotcha" style="display:none" />

      <button type="submit">Send Feedback</button>
    </form>

    <div class="success" id="success-msg">
      <div class="icon">OK</div>
      <h2>Thanks!</h2>
      <p>Your feedback has been received. We'll review it shortly.</p>
    </div>

    <a class="back" href="https://speaklocal.app">&larr; Back to speaklocal.app</a>
  </div>

  <script>
    const form = document.getElementById('feedback-form');
    const success = document.getElementById('success-msg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { Accept: 'application/json' }
      });
      if (res.ok) {
        form.style.display = 'none';
        success.style.display = 'block';
      } else {
        alert('Something went wrong. Please try again.');
      }
    });
  </script>
</body>
</html>
