version: 1
updated_at: 2026-04-18
notes:
  - Phase-1 pilot lock file for OpenClaw â†” Codex workflow inside SpeakLocal.
  - Keep this file small and ownership-focused.
  - Use it to prevent overlapping write scopes, not to store full task history.
lock_classes:
  - id: shared_phrasebook_truth
    description: Shared phrasebook truth, source rows, mapping logic, premium boundaries, and phrase-family integrity.
  - id: shared_audio_pipeline
    description: Shared audio generation, mapping, naming, seam validation, and app-audio asset integrity.
  - id: ios_viet_app_shell
    description: Viet-specific iOS app presentation, monetization framing, search surfaces, and scenario detail behavior.
  - id: ios_family_shared_ui
    description: Shared family app shell, shared components, app registry, and family presentation/runtime behavior.
  - id: website_starter_exports
    description: Export-driven starter-module outputs, preview JSON, and website export seams.
  - id: website_content_conversion
    description: Website copy, conversion framing, trust panels, and destination content alignment.
  - id: ops_docs_truth
    description: Operational docs, readiness docs, validation records, blockers, and operator-facing truth.
  - id: apple_release_testflight
    description: Build, submit, TestFlight, App Store Connect, sandbox, and purchase-test coordination.
  - id: future_language_content_drafts
    description: Prep-only future language research and content-draft lanes that should not silently spill into runtime wiring.
  - id: thai_prep_lane
    description: Prep-only research and authoring-scaffold work for the Thailand / Thai lane.
  - id: japanese_prep_lane
    description: Prep-only research and authoring-scaffold work for the Japan / Japanese lane.
  - id: turkish_prep_lane
    description: Prep-only research and authoring-scaffold work for the Turkey / Turkish lane.
  - id: spanish_prep_lane
    description: Prep-only research and authoring-scaffold work for the Spain / Spanish lane.
  - id: italian_prep_lane
    description: Prep-only research and authoring-scaffold work for the Italy / Italian lane.
  - id: tagalog_v2_prep_lane
    description: Tagalog v2 prep and authoring-scaffold work that strengthens the lane without wiring new runtime behavior.
  - id: german_prep_lane
    description: Prep-only research and authoring-scaffold work for the Germany / German lane.
  - id: french_prep_lane
    description: Prep-only research and authoring-scaffold work for the France / French lane.
  - id: korean_prep_lane
    description: Prep-only research and authoring-scaffold work for the South Korea / Korean lane.
  - id: indonesia_prep_lane
    description: Prep-only research and authoring-scaffold work for the Indonesia / Indonesian lane.
